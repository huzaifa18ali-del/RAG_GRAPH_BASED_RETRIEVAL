# =============================================================================
# config.yaml — Pipeline Configuration
#
# All tuneable parameters live here. The Python source files are untouched
# by domain changes. To run the pipeline on a different corpus, either edit
# this file directly or point the pipeline at a different YAML profile:
#
#   python run_pipeline.py --config configs/legal.yaml
#   python run_pipeline.py --config configs/clinical.yaml
#
# Parameter comments explain *why* each value exists, not just what it is,
# so you can reason about changes rather than guess.
# =============================================================================


# -----------------------------------------------------------------------------
# Paths — where data lives and where outputs go
# -----------------------------------------------------------------------------
paths:
  data_dir: "data"                          # root for all inputs and outputs
  raw_file_suffix: "_clean.txt"             # only files ending in this are processed

  # Phase outputs (relative to data_dir)
  output_sentences:    "output_v2.json"
  output_embeddings:   "embeddings.npy"
  output_manifest:     "embeddings_manifest.json"
  output_graph:        "idea_graph.json"
  output_clusters:     "cluster_summary.json"
  output_summary_json: "summary.json"
  output_summary_txt:  "summary.txt"
  output_faiss_index:  "faiss.index"
  output_batch:        "batch_results.jsonl"
  export_dir:          "exports"


# -----------------------------------------------------------------------------
# pdf_to_txt — PDF extraction
# -----------------------------------------------------------------------------
pdf:
  skip_first_page: true     # skip cover / TOC pages
  ocr_dpi: 300              # DPI when rasterising scanned pages for OCR
                            # 300 is the standard OCR minimum; 200 is faster but
                            # loses accuracy on small fonts
  min_text_chars: 20        # pages with fewer characters are treated as scanned
  column_gap_ratio: 0.10    # fraction of page width that counts as a column gap
                            # 0.10 works for standard 2-col academic layouts;
                            # raise to 0.15 for narrow-margin legal documents


# -----------------------------------------------------------------------------
# phase1 — Data preprocessing / clause splitting
# -----------------------------------------------------------------------------
phase1:
  min_words: 4              # clauses shorter than this are dropped as fragments
                            # Literary prose:  4  (short clauses carry meaning)
                            # Legal documents: 6  (need subject + predicate + object)
                            # Support logs:    5  (short messages are often meaningful)


# -----------------------------------------------------------------------------
# phase2 — Sentence embeddings
# -----------------------------------------------------------------------------
phase2:
  model_name: "all-mpnet-base-v2"   # sentence-transformers model identifier
                                     # Alternatives:
                                     #   all-MiniLM-L6-v2   — faster, lower quality
                                     #   all-mpnet-base-v2  — best quality, default
                                     #   paraphrase-multilingual-mpnet-base-v2  — multilingual

  batch_size: 32            # sentences per GPU/CPU forward pass
                            # Reduce to 16 if you hit OOM on mpnet

  max_tokens: 384           # word count above which a sentence is chunked
                            # mpnet's actual token limit is 512 subword tokens;
                            # 384 words gives comfortable headroom for subword expansion

  chunk_stride: 128         # sliding-window step size in words (overlap = max_tokens - stride)
                            # 128/384 = 33% overlap — enough boundary context without
                            # the 83% redundancy the old value of 64 caused


# -----------------------------------------------------------------------------
# phase3 — Idea graph construction + clustering
# -----------------------------------------------------------------------------
phase3:
  # --- Neighbor search ---
  top_k: 5                  # maximum neighbors per node (hard cap)
                            # Raise to 8-10 for dense technical corpora where
                            # many sentences are legitimately close

  # --- FAISS HNSW index ---
  # Milestone 2: replaces brute-force cosine_similarity (O(N^2)) and the old
  # IVFFlat index entirely. HNSW is used for every corpus size — there is no
  # more "exact path" — so memory stays O(N) regardless of corpus size.
  hnsw_m:               32    # graph connectivity (neighbors per node in the HNSW graph)
                              # 16-64 typical; higher = better recall, more memory/build time
  hnsw_ef_construction: 200   # candidate list size during index build
                              # higher = better graph quality, slower build (one-time cost)
  hnsw_ef_search:       64    # candidate list size at query time
                              # higher = better recall, slower search; must be >= top_k

  # --- Dynamic per-node similarity threshold ---
  dynamic_threshold_sigma: 0.5    # threshold = mean_sim − sigma * std_sim
                                  # Lower = more edges. 0.5 is conservative;
                                  # use 0.3 for sparse corpora to avoid isolation

  global_threshold_min: 0.35      # hard floor — never accept weaker edges
                                  # Literary:  0.35
                                  # Legal:     0.45  (requires tighter semantic match)
                                  # Clinical:  0.40

  global_threshold_max: 0.90      # hard ceiling — always accept edges this strong
                                  # (prevents pathological pruning of obvious links)

  # --- HDBSCAN clustering ---
  hdbscan_min_cluster: 3    # minimum sentences to form a cluster
                            # Raise to 5 for large corpora (>10k sentences)
  hdbscan_min_samples: 2    # controls noise sensitivity; raise to reduce noise points
  hdbscan_metric: "euclidean"     # euclidean on L2-normalised vecs ≡ cosine distance

  # --- Louvain fallback ---
  louvain_resolution: 1.0         # higher = more, smaller communities
  louvain_edge_threshold: 0.50    # only wire Louvain graph with strong edges

  # --- Sequential / proximity edges ---
  # Added alongside similarity edges so query-time PPR can "keep reading"
  # contiguous text (e.g. a heading at clause N followed by descriptive body
  # text at N+1..N+k) even when those clauses aren't semantically similar
  # enough to each other to have earned a similarity edge on their own.
  enable_sequential_edges: true          # master switch; false = old behaviour
                                          # (similarity edges only)
  sequential_window: 2                   # each clause links forward to the next
                                          # N clauses in original document order
                                          # (i -> i+1 .. i+window)
  sequential_edge_weight: 0.6            # fixed weight for sequential edges — kept
                                          # below global_threshold_min (0.35) so they
                                          # never outrank a real semantic match, but
                                          # non-zero so PageRank's weighted walk can
                                          # still traverse them
  enable_cross_paragraph_sequential: false  # if true, sequential edges may bridge
                                          # paragraph_id boundaries; leave false —
                                          # bridging sections reintroduces the noise
                                          # dynamic thresholding was built to remove


# -----------------------------------------------------------------------------
# phase4 — Structured summarization
# -----------------------------------------------------------------------------
phase4:
  top_n_per_cluster: 4      # body sentences per cluster section (excl. centroid)
                            # Raise for longer summaries; 4 is readable default

  max_bridges: 2            # cross-cluster bridge sentences shown per cluster
  min_sent_words: 6         # sentences shorter than this are merge candidates
  max_line_width: 120       # plain-text output wrap width (characters)
  pagerank_damping: 0.85    # standard PageRank damping factor; rarely needs changing
  include_noise: true       # append the HDBSCAN noise cluster at the end of summary


# -----------------------------------------------------------------------------
# phase5 — Interactive query / Q&A
# -----------------------------------------------------------------------------
phase5:
  embed_model_name: "all-mpnet-base-v2"           # must match phase2.model_name
  rerank_model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

  default_top_k: 5          # results returned per query
  faiss_nprobe: 8           # FAISS cells searched at query time (lower than phase3
                            # because query latency matters more than recall here)
  faiss_nlist: 64
  rerank_fetch_mult: 4      # fetch top_k * this many candidates before re-ranking
  default_alpha: 0.5        # hybrid score weight: alpha*semantic + (1-alpha)*graph
  default_approx_k: 0       # centroid pre-filter clusters (0 = disabled)
  console_width: 96         # output formatting width

  # Path to a custom theme dictionary JSON, or null to use the built-in
  # literary theme dictionary. Custom format:
  #   { "liability": ["liable", "breach", "damages"], "negligence": [...] }
  theme_dict_path: null


# -----------------------------------------------------------------------------
# ppr — Dynamic query-time graph traversal (Personalized PageRank)
# -----------------------------------------------------------------------------
ppr:
  seed_top_n: 8              # HNSW nearest-neighbor entry points seeded into the
                              # personalization vector. More seeds = broader initial
                              # coverage before the graph walk redistributes rank.

  result_top_m: 8           # final number of top-ranked clauses returned as LLM context
                              # Keep modest — this becomes the entire grounding context,
                              # and larger contexts dilute the synthesis model's focus.

  pagerank_alpha: 0.9       # damping factor for personalized PageRank
                              # Same meaning as phase4.pagerank_damping but kept as its
                              # own knob — phase4 tunes a static importance signal over
                              # the WHOLE graph, this tunes a query-local walk that should
                              # stay tightly anchored to the seed nodes. Do not conflate.

  max_iter: 200               # PageRank power-iteration cap before giving up
  tol: 1.0e-6                 # PageRank convergence tolerance

  min_edge_weight: 0.0        # optional floor when building the traversal graph from
                              # idea_graph.json edges (0.0 = use every stored edge as-is;
                              # the edges were already thresholded once in Phase 3)

  # --- Rule-based heading-context expansion ---
  # PPR is a global ranking, so a heading-like clause can surface as a top
  # result while the descriptive body text right after it never makes the
  # cut (a moderate sequential-edge weight loses out to stronger similarity
  # edges elsewhere in the graph). This deterministic, regex-based pass runs
  # after personalized_pagerank_search() and pulls in the clauses that
  # follow any top-ranked heading-like clause, regardless of its own PPR
  # score. Expansion length is dynamic: it walks forward until it hits
  # another heading-like clause (natural section boundary) or the hard cap.
  enable_heading_expansion: true      # master switch; false = PPR results only
  max_expansion_per_heading: 15       # HARD CEILING, not a fixed target — dynamic
                                      # expansion (see expansion_stop_at_boundary)
                                      # normally stops well short of this; it just
                                      # guarantees expansion can never run unbounded
  min_words_for_heading: 8            # word-count threshold for the short
                                      # ALL-CAPS / Title Case heading check
  expansion_stop_at_boundary: true    # stop as soon as another heading-like clause
                                      # is hit, instead of always walking to the
                                      # hard cap. false = old fixed-N behaviour,
                                      # kept for rollback/comparison
  min_expansion_before_boundary: 3    # ignore a heading-like clause as a boundary
                                      # until at least this many clauses have
                                      # already been pulled in — prevents frequent
                                      # short headings (e.g. legal subsections) or
                                      # an early dialogue line from collapsing
                                      # expansion to near-zero


# -----------------------------------------------------------------------------
# llm — Local generative synthesis (Ollama)
# -----------------------------------------------------------------------------
llm:
  provider: "ollama"                       # only "ollama" is implemented; kept explicit
                                            # so a future provider swap is a one-line config change
  ollama_base_url: "http://localhost:11434"  # local Ollama daemon endpoint
  model_name: "llama3.1"                    # pulled model identifier (e.g. llama3, mistral)
                                            # must already be pulled: `ollama pull llama3`

  connect_timeout_seconds: 5.0             # fail fast if the daemon isn't running at all
  request_timeout_seconds: 120.0           # generous — consumer laptop CPUs can take
                                            # 30-90s for a single generation pass

  temperature: 0.2                         # low — this is factual synthesis, not creative writing
  num_predict: 300                       # cap on generated tokens (Ollama's max_tokens equivalent)

  max_context_chars: 6000                  # hard cap on the assembled context block size,
                                            # independent of result_top_m, as a defensive
                                            # ceiling against unexpectedly long clauses
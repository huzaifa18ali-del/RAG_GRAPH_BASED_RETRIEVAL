# configs/clinical.yaml
# Domain profile: Clinical trial reports / medical research
#
# Key differences from default (literary) profile:
#   - Moderate min_words: medical sentences are dense but not always long
#   - Moderate similarity floor: medical terminology clusters well but
#     different drugs/conditions can use similar language
#   - Larger HDBSCAN min_cluster: medical topics need statistical weight
#   - Custom theme dictionary pointing to medical concept keywords

paths:
  data_dir: "data"
  raw_file_suffix: "_clean.txt"
  output_sentences:    "output_v2.json"
  output_embeddings:   "embeddings.npy"
  output_manifest:     "embeddings_manifest.json"
  output_graph:        "idea_graph.json"
  output_clusters:     "cluster_summary.json"
  output_summary_json: "summary.json"
  output_summary_txt:  "summary.txt"
  output_faiss_index:  "faiss.index"
  output_batch:        "batch_results.jsonl"
  export_dir:          "exports"

pdf:
  skip_first_page: true
  ocr_dpi: 300
  min_text_chars: 20
  column_gap_ratio: 0.10

phase1:
  min_words: 5              # medical abbreviations make short clauses meaningful

phase2:
  model_name: "all-mpnet-base-v2"   # consider pritamdeka/PubMedBERT-mnli-snli-scinli
                                     # for purely clinical corpora if quality is low
  batch_size: 32
  max_tokens: 384
  chunk_stride: 128

phase3:
  top_k: 5
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 64
  dynamic_threshold_sigma: 0.5
  global_threshold_min: 0.40        # slightly higher than literary; med terms are precise
  global_threshold_max: 0.90
  hdbscan_min_cluster: 5            # clinical topics need more evidence to form a cluster
  hdbscan_min_samples: 3
  hdbscan_metric: "euclidean"
  louvain_resolution: 1.0
  louvain_edge_threshold: 0.50

phase4:
  top_n_per_cluster: 5
  max_bridges: 2
  min_sent_words: 6
  max_line_width: 120
  pagerank_damping: 0.85
  include_noise: true               # noise in clinical docs may be adverse event reports

phase5:
  embed_model_name: "all-mpnet-base-v2"
  rerank_model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  default_top_k: 5
  faiss_nprobe: 8
  faiss_nlist: 64
  rerank_fetch_mult: 4
  default_alpha: 0.5
  default_approx_k: 0
  console_width: 96
  theme_dict_path: "configs/themes_clinical.json"